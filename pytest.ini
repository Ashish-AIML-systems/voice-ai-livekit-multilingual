[pytest]
# Enable pytest-asyncio in auto mode so we don't need @pytest.mark.asyncio
# on every coroutine test.
asyncio_mode = auto

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output formatting
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

# Custom markers (keep flake-free)
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks integration tests that need API keys
