  - products
  - features
  - pricing overview
  - offers
  - discounts
  - promotions
  - campaigns
  - brand
  - company info
  - faqs
  - testimonials
  - success stories
  - festivals
  - events
  - launches
  - new arrivals

blocked_topics:
  - legal
  - refund
  - billing dispute
  - technical support
  - bug
  - error
  - competitor
  - personal data
  - phone number
  - aadhaar
  - pan card
  - financial advice
  - investment
  - medical
  - health claim
  - lawsuit
  - court

